<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Magna Via · Character Classes</title>
<style>/* mv-responsive */
  *,*::before,*::after{box-sizing:border-box;}
  html,body{overflow-x:hidden;}
  img,svg{max-width:100%;height:auto;}

  html,body{margin:0;background:#0a0a14;font-family:'Nunito';color:#e8e0d0;}
  .wrap{padding:12px;display:grid;grid-template-columns:repeat(auto-fit, minmax(150px, 1fr));gap:8px;}
  .tile{border:0.5px solid #2a2a40;border-radius:10px;overflow:hidden;background:#0a0a14;}
  .art{height:130px;display:flex;align-items:center;justify-content:center;}
  img{height:100%;width:auto;object-fit:contain;}
  .cap{font-family:'Cinzel';font-size:10px;font-weight:600;color:#c8a030;letter-spacing:0.1em;text-transform:uppercase;padding:6px 8px;text-align:center;border-top:0.5px solid #2a2a40;background:#14141e;}
</style></head>
<body><div class="wrap">
  <div class="tile"><div class="art"><img src="../assets/classes/the-knight.png"></div><div class="cap">Knight</div></div>
  <div class="tile"><div class="art"><img src="../assets/classes/the-mage.png"></div><div class="cap">Mage</div></div>
  <div class="tile"><div class="art"><img src="../assets/classes/the-scholar.png"></div><div class="cap">Scholar</div></div>
  <div class="tile"><div class="art"><img src="../assets/classes/the-healer.png"></div><div class="cap">Healer</div></div>
  <div class="tile"><div class="art"><img src="../assets/classes/the-bard.png"></div><div class="cap">Bard</div></div>
  <div class="tile"><div class="art"><img src="../assets/classes/the-merchant.png"></div><div class="cap">Merchant</div></div>
  <div class="tile"><div class="art"><img src="../assets/classes/the-commander.png"></div><div class="cap">Commander</div></div>
  <div class="tile"><div class="art"><img src="../assets/classes/the-alchemist.png"></div><div class="cap">Alchemist</div></div>
</div></body></html>
