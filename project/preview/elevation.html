<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Magna Via · Elevation &amp; Glows</title>
<style>/* mv-responsive */
  *,*::before,*::after{box-sizing:border-box;}
  html,body{overflow-x:hidden;}
  img,svg{max-width:100%;height:auto;}

  html,body{margin:0;background:#0a0a14;color:#e8e0d0;font-family:'Nunito';}
  .wrap{padding:22px;display:grid;grid-template-columns:repeat(auto-fit, minmax(170px, 1fr));gap:14px;}
  .tile{background:#1e1e30;border:0.5px solid #2a2a40;border-radius:12px;height:78px;display:flex;align-items:center;justify-content:center;font-family:'Cinzel';font-size:12px;font-weight:600;color:#c8b890;letter-spacing:0.12em;text-transform:uppercase;}
  .cap{font-family:'Nunito';font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#887870;margin-top:6px;text-align:center;}
</style></head>
<body><div class="wrap">
  <div><div class="tile" style="box-shadow:0 2px 8px rgba(0,0,0,.45);">Card</div><div class="cap">Shadow · card</div></div>
  <div><div class="tile" style="box-shadow:0 8px 24px rgba(0,0,0,.55);">Lifted</div><div class="cap">Shadow · lifted</div></div>
  <div><div class="tile" style="color:#c8a030;border-color:#c8a030;box-shadow:0 0 12px rgba(200,160,48,.5);">Gold Glow</div><div class="cap">Glow · active CTA</div></div>
  <div><div class="tile" style="color:#a080d0;box-shadow:0 0 20px rgba(90,58,138,.6);">Oracle</div><div class="cap">Glow · purple</div></div>
</div></body></html>
