<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Magna Via · Birth Star Elements</title>
<style>/* mv-responsive */
  *,*::before,*::after{box-sizing:border-box;}
  html,body{overflow-x:hidden;}
  img,svg{max-width:100%;height:auto;}

  html,body{margin:0;background:#0a0a14;color:#e8e0d0;font-family:'Nunito',sans-serif;}
  .wrap{padding:18px;display:grid;grid-template-columns:repeat(auto-fit, minmax(170px, 1fr));gap:10px;}
  .el{border:0.5px solid #2a2a40;border-radius:10px;overflow:hidden;background:#14141e;}
  .chip{height:96px;display:flex;align-items:flex-end;justify-content:center;position:relative;overflow:hidden;}
  .chip::before{content:'';position:absolute;inset:0;}
  .glyph{font-family:'Cinzel';font-weight:700;font-size:22px;letter-spacing:0.12em;z-index:1;padding-bottom:14px;}
  .meta{padding:10px;}
  .name{font-family:'Cinzel';font-size:12px;font-weight:600;color:#c8b890;letter-spacing:0.08em;text-transform:uppercase;}
  .sub{font-family:'Nunito';font-size:10.5px;color:#887870;margin-top:2px;}
  .ignis .chip::before{background:radial-gradient(closest-side at 50% 80%,rgba(200,48,32,.45),transparent 70%);}
  .aqua .chip::before{background:radial-gradient(closest-side at 50% 80%,rgba(32,96,200,.45),transparent 70%);}
  .terra .chip::before{background:radial-gradient(closest-side at 50% 80%,rgba(48,144,80,.45),transparent 70%);}
  .ventus .chip::before{background:radial-gradient(closest-side at 50% 80%,rgba(112,48,192,.45),transparent 70%);}
</style></head>
<body><div class="wrap">
  <div class="el ignis"><div class="chip"><div class="glyph" style="color:#e86050">IGNIS</div></div><div class="meta"><div class="name" style="color:#e86050">Fire</div><div class="sub">#C83020 · Realistic · Enterprising</div></div></div>
  <div class="el aqua"><div class="chip"><div class="glyph" style="color:#6090e8">AQUA</div></div><div class="meta"><div class="name" style="color:#6090e8">Water</div><div class="sub">#2060C8 · Social</div></div></div>
  <div class="el terra"><div class="chip"><div class="glyph" style="color:#60b080">TERRA</div></div><div class="meta"><div class="name" style="color:#60b080">Earth</div><div class="sub">#309050 · Conventional</div></div></div>
  <div class="el ventus"><div class="chip"><div class="glyph" style="color:#a070e0">VENTUS</div></div><div class="meta"><div class="name" style="color:#a070e0">Wind</div><div class="sub">#7030C0 · Investigative · Artistic</div></div></div>
</div></body></html>
