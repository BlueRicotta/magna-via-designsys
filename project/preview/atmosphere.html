<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Magna Via · Atmosphere</title>
<style>/* mv-responsive */
  *,*::before,*::after{box-sizing:border-box;}
  html,body{overflow-x:hidden;}
  img,svg{max-width:100%;height:auto;}

  html,body{margin:0;background:#0a0a14;font-family:'Nunito';color:#e8e0d0;}
  .wrap{padding:14px;display:grid;grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));gap:12px;}
  .tile{border:0.5px solid #2a2a40;border-radius:12px;overflow:hidden;position:relative;aspect-ratio:16/10;}
  .splash{background:url('../assets/backgrounds/arcadia-splash.png') center/cover;}
  .scrim{position:absolute;inset:0;background:linear-gradient(to top,#0a0a14 0%,rgba(10,10,20,0.6) 35%,rgba(10,10,20,0) 70%);}
  .text{position:absolute;left:16px;right:16px;bottom:14px;}
  .t1{font-family:'Cinzel';font-weight:700;color:#c8a030;font-size:18px;letter-spacing:0.06em;text-transform:uppercase;}
  .t2{font-family:'Nunito';font-size:11px;color:#c8b890;margin-top:4px;}
  .constellation{background:#0a0a14;display:flex;align-items:center;justify-content:center;position:relative;}
  .constellation svg{width:80%;height:auto;opacity:.7;}
</style></head>
<body><div class="wrap">
  <div class="tile"><div class="splash" style="position:absolute;inset:0;"></div><div class="scrim"></div><div class="text"><div class="t1">Arcadia</div><div class="t2">Full-bleed illustrated background + bottom scrim</div></div></div>
  <div class="tile constellation">
    <svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
      <defs><filter id="g"><feGaussianBlur stdDeviation="1.5"/></filter></defs>
      <g stroke="#c8a030" stroke-width="0.6" opacity="0.5" fill="none">
        <line x1="30" y1="30" x2="70" y2="55"/><line x1="70" y1="55" x2="110" y2="40"/>
        <line x1="110" y1="40" x2="140" y2="70"/><line x1="140" y1="70" x2="170" y2="50"/>
        <line x1="70" y1="55" x2="90" y2="90"/><line x1="90" y1="90" x2="140" y2="70"/>
      </g>
      <g fill="#e8d090">
        <circle cx="30" cy="30" r="1.5"/><circle cx="70" cy="55" r="2"/><circle cx="110" cy="40" r="1.8"/>
        <circle cx="140" cy="70" r="2"/><circle cx="170" cy="50" r="1.5"/><circle cx="90" cy="90" r="1.8"/>
      </g>
    </svg>
    <div class="text"><div class="t1" style="font-size:14px">Constellation texture</div><div class="t2">Line pattern at 6–12% opacity behind portraits</div></div>
  </div>
</div></body></html>
