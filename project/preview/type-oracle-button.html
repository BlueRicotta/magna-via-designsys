<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Magna Via · Type — Oracle &amp; Button</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>/* mv-responsive */
  *,*::before,*::after{box-sizing:border-box;}
  html,body{overflow-x:hidden;}
  img,svg{max-width:100%;height:auto;}

  html,body{margin:0;background:#0a0a14;color:#e8e0d0;font-family:'Nunito';}
  .wrap{padding:22px;display:grid;grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));gap:14px;}
  .card{background:#14141e;border:0.5px solid #2a2a40;border-radius:12px;padding:18px;}
  .label{font-family:'Nunito';font-size:10px;color:#887870;letter-spacing:0.14em;text-transform:uppercase;}
  .oracle{font-family:'Crimson Text';font-style:italic;font-size:17px;color:#c8b890;margin-top:10px;line-height:1.5;}
  .btn{display:inline-block;background:#c8a030;color:#1a0e00;font-family:'Cinzel';font-weight:700;font-size:15px;letter-spacing:0.1em;text-transform:uppercase;padding:14px 26px;border-radius:12px;margin-top:10px;box-shadow:inset 0 0 0 0.5px rgba(232,208,144,.5), 0 0 18px rgba(200,160,48,.25);}
  .meta{font-family:'Nunito';font-size:11px;color:#887870;margin-top:8px;}
</style></head>
<body><div class="wrap">
  <div class="card">
    <div class="label">Oracle · Crimson Italic</div>
    <div class="oracle">"Selamat datang, Pejuang. Arcadia telah menanti..."</div>
    <div class="meta">Crimson Text 400 italic · 17/15</div>
  </div>
  <div class="card">
    <div class="label">Button · Cinzel 700</div>
    <div><span class="btn">Mulai Perjalanan</span></div>
    <div class="meta">Cinzel 700 · 15, ls 0.1em, uppercase</div>
  </div>
</div></body></html>
