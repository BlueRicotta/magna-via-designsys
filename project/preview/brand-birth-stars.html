<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Magna Via · Birth Star Creatures</title>
<style>/* mv-responsive */
  *,*::before,*::after{box-sizing:border-box;}
  html,body{overflow-x:hidden;}
  img,svg{max-width:100%;height:auto;}

  html,body{margin:0;background:#0a0a14;font-family:'Nunito';color:#e8e0d0;}
  .wrap{padding:14px;display:grid;grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));gap:10px;}
  .tile{border:0.5px solid #2a2a40;border-radius:12px;overflow:hidden;background:#0a0a14;}
  .art{height:160px;display:flex;align-items:center;justify-content:center;}
  img{height:100%;width:auto;object-fit:contain;}
  .cap{font-family:'Cinzel';font-size:11px;font-weight:600;color:#c8b890;letter-spacing:0.12em;text-transform:uppercase;padding:8px 10px;text-align:center;border-top:0.5px solid #2a2a40;background:#14141e;}
</style></head>
<body><div class="wrap">
  <div class="tile"><div class="art"><img src="../assets/birth-stars/ignis.png"></div><div class="cap" style="color:#e86050">Ignis · Fire</div></div>
  <div class="tile"><div class="art"><img src="../assets/birth-stars/aqua.png"></div><div class="cap" style="color:#6090e8">Aqua · Water</div></div>
  <div class="tile"><div class="art"><img src="../assets/birth-stars/terra.png"></div><div class="cap" style="color:#60b080">Terra · Earth</div></div>
  <div class="tile"><div class="art"><img src="../assets/birth-stars/ventus.png"></div><div class="cap" style="color:#a070e0">Ventus · Wind</div></div>
</div></body></html>
