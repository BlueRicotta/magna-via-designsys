<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Magna Via · Logo Lockups</title>
<style>/* mv-responsive */
  *,*::before,*::after{box-sizing:border-box;}
  html,body{overflow-x:hidden;}
  img,svg{max-width:100%;height:auto;}

  html,body{margin:0;background:#0a0a14;font-family:'Nunito';color:#e8e0d0;}
  .wrap{padding:18px;display:grid;grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));gap:12px;}
  .tile{border:0.5px solid #2a2a40;border-radius:12px;overflow:hidden;display:flex;flex-direction:column;}
  .art{display:flex;align-items:center;justify-content:center;flex:1;min-height:130px;}
  .dark{background:#0a0a14;}
  .light{background:#e8e0d0;}
  .cap{font-family:'Nunito';font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#887870;padding:8px 12px;background:#14141e;border-top:0.5px solid #2a2a40;}
  img{display:block;max-width:88%;max-height:120px;}
</style></head>
<body><div class="wrap">
  <div class="tile"><div class="art dark"><img src="../assets/logos/magna-via-logo-dark.svg" alt=""></div><div class="cap">Full lockup · dark</div></div>
  <div class="tile"><div class="art light"><img src="../assets/logos/magna-via-logo-light.svg" alt=""></div><div class="cap">Full lockup · light</div></div>
  <div class="tile"><div class="art dark"><img src="../assets/logos/magna-via-icon.svg" alt="" style="max-height:118px"></div><div class="cap">Symbol mark · app icon</div></div>
</div></body></html>
