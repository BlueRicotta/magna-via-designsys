<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Magna Via · Badges &amp; Chips</title>
<style>/* mv-responsive */
  *,*::before,*::after{box-sizing:border-box;}
  html,body{overflow-x:hidden;}
  img,svg{max-width:100%;height:auto;}

  html,body{margin:0;background:#0a0a14;color:#e8e0d0;font-family:'Nunito';}
  .wrap{padding:22px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
  .chip{display:inline-flex;align-items:center;gap:6px;font-family:'Nunito';font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:6px 12px;border-radius:999px;border:0.5px solid #2a2a40;color:#c8b890;background:#14141e;}
  .gold{border-color:#c8a030;color:#c8a030;background:rgba(200,160,48,.06);}
  .ignis{border-color:#c83020;color:#e86050;background:rgba(200,48,32,.08);}
  .aqua{border-color:#2060c8;color:#6090e8;background:rgba(32,96,200,.1);}
  .terra{border-color:#309050;color:#60b080;background:rgba(48,144,80,.1);}
  .ventus{border-color:#7030c0;color:#a070e0;background:rgba(112,48,192,.1);}
  .step{border-radius:6px;}
</style></head>
<body><div class="wrap">
  <span class="chip">Default</span>
  <span class="chip gold">✦ Ancient Gold</span>
  <span class="chip ignis">Fire · Ignis</span>
  <span class="chip aqua">Water · Aqua</span>
  <span class="chip terra">Earth · Terra</span>
  <span class="chip ventus">Wind · Ventus</span>
  <span class="chip step">Step 2 of 5</span>
  <span class="chip gold step">Level 3 — Hobby Card</span>
</div></body></html>
