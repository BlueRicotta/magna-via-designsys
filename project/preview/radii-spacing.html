<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Magna Via · Radii &amp; Spacing</title>
<style>/* mv-responsive */
  *,*::before,*::after{box-sizing:border-box;}
  html,body{overflow-x:hidden;}
  img,svg{max-width:100%;height:auto;}

  html,body{margin:0;background:#0a0a14;color:#e8e0d0;font-family:'Nunito';}
  .wrap{padding:20px;}
  .row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;}
  .tile{background:#1e1e30;border:0.5px solid #2a2a40;display:flex;align-items:center;justify-content:center;color:#c8b890;font-family:'Nunito';font-size:11px;font-weight:600;}
  .cap{font-family:'Nunito';font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#887870;margin-top:6px;text-align:center;}
  .col{display:flex;flex-direction:column;align-items:center;}
  .sp-row{display:flex;gap:12px;align-items:flex-end;margin-top:22px;}
  .bar{background:#c8a030;height:10px;border-radius:2px;}
  .sp-col{display:flex;flex-direction:column;align-items:center;gap:6px;}
</style></head>
<body><div class="wrap">
  <div class="row">
    <div class="col"><div class="tile" style="width:70px;height:56px;border-radius:6px">6</div><div class="cap">r-sm</div></div>
    <div class="col"><div class="tile" style="width:70px;height:56px;border-radius:8px">8</div><div class="cap">r-md · inputs</div></div>
    <div class="col"><div class="tile" style="width:70px;height:56px;border-radius:12px">12</div><div class="cap">r-lg · cards</div></div>
    <div class="col"><div class="tile" style="width:70px;height:56px;border-radius:16px">16</div><div class="cap">r-xl</div></div>
    <div class="col"><div class="tile" style="width:70px;height:56px;border-radius:999px">pill</div><div class="cap">r-pill</div></div>
  </div>
  <div class="sp-row">
    <div class="sp-col"><div class="bar" style="width:4px"></div><div class="cap">4</div></div>
    <div class="sp-col"><div class="bar" style="width:8px"></div><div class="cap">8</div></div>
    <div class="sp-col"><div class="bar" style="width:12px"></div><div class="cap">12</div></div>
    <div class="sp-col"><div class="bar" style="width:16px"></div><div class="cap">16</div></div>
    <div class="sp-col"><div class="bar" style="width:24px"></div><div class="cap">24</div></div>
    <div class="sp-col"><div class="bar" style="width:32px"></div><div class="cap">32</div></div>
    <div class="sp-col"><div class="bar" style="width:48px"></div><div class="cap">48</div></div>
    <div class="sp-col"><div class="bar" style="width:64px"></div><div class="cap">64</div></div>
  </div>
</div></body></html>
