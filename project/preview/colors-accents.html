<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Magna Via · Accent Colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>/* mv-responsive */
  *,*::before,*::after{box-sizing:border-box;}
  html,body{overflow-x:hidden;}
  img,svg{max-width:100%;height:auto;}

  html,body{margin:0;background:#0a0a14;color:#e8e0d0;font-family:'Nunito',sans-serif;}
  .wrap{padding:20px;display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:12px;}
  .swatch{border:0.5px solid #2a2a40;border-radius:10px;overflow:hidden;background:#14141e;}
  .chip{height:80px;display:flex;align-items:center;justify-content:center;position:relative;}
  .star{width:24px;height:24px;filter:drop-shadow(0 0 10px rgba(200,160,48,.6));}
  .meta{padding:10px 12px;}
  .name{font-family:'Cinzel';font-size:13px;font-weight:600;color:#e8e0d0;letter-spacing:0.06em;text-transform:uppercase;}
  .sub{font-family:'Nunito';font-size:11px;color:#887870;margin-top:2px;}
</style></head>
<body><div class="wrap">
  <div class="swatch"><div class="chip" style="background:radial-gradient(closest-side,rgba(200,160,48,.25),#14141e 70%);"><div style="font-family:'Cinzel';font-weight:700;color:#c8a030;letter-spacing:0.12em;text-shadow:0 0 12px rgba(200,160,48,.5);">✦ GOLD ✦</div></div><div class="meta"><div class="name" style="color:#c8a030">Ancient Gold</div><div class="sub">#C8A030 · Primary CTA, focus</div></div></div>
  <div class="swatch"><div class="chip" style="background:radial-gradient(closest-side,rgba(90,58,138,.35),#14141e 70%);"><div style="font-family:'Crimson Text';font-style:italic;color:#a080d0;font-size:18px;">Oracle</div></div><div class="meta"><div class="name" style="color:#a080d0">Mystic Purple</div><div class="sub">#5A3A8A · Magic / oracle UI</div></div></div>
  <div class="swatch"><div class="chip" style="background:radial-gradient(closest-side,rgba(200,96,48,.35),#14141e 70%);"><div style="font-family:'Cinzel';font-weight:700;color:#e8a060;letter-spacing:0.08em;">HORIZON</div></div><div class="meta"><div class="name" style="color:#e8a060">Ember Dusk</div><div class="sub">#C86030 · Ignis accent, horizon</div></div></div>
</div></body></html>
