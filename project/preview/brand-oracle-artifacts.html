<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Magna Via · Oracle &amp; Artifacts</title>
<style>/* mv-responsive */
  *,*::before,*::after{box-sizing:border-box;}
  html,body{overflow-x:hidden;}
  img,svg{max-width:100%;height:auto;}

  html,body{margin:0;background:#0a0a14;font-family:'Nunito';color:#e8e0d0;}
  .wrap{padding:14px;display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:10px;align-items:stretch;}
  .tile{border:0.5px solid #2a2a40;border-radius:12px;overflow:hidden;background:#0a0a14;display:flex;flex-direction:column;}
  .art{flex:1;display:flex;align-items:center;justify-content:center;min-height:140px;}
  img{height:100%;width:auto;max-height:150px;object-fit:contain;}
  .cap{font-family:'Cinzel';font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;padding:6px 8px;text-align:center;border-top:0.5px solid #2a2a40;background:#14141e;color:#c8b890;}
  .oracle{background:radial-gradient(closest-side at 50% 55%,rgba(90,58,138,.25),#0a0a14 70%);}
</style></head>
<body><div class="wrap">
  <div class="tile oracle"><div class="art"><img src="../assets/characters/cenayang-portrait.png"></div><div class="cap" style="color:#a080d0">Cenayang · Oracle</div></div>
  <div class="tile"><div class="art"><img src="../assets/artifacts/guardians-lantern.png"></div><div class="cap">Guardian's Lantern</div></div>
  <div class="tile"><div class="art"><img src="../assets/artifacts/keepers-codex.png"></div><div class="cap">Keeper's Codex</div></div>
  <div class="tile"><div class="art"><img src="../assets/artifacts/leaders-crown.png"></div><div class="cap">Leader's Crown</div></div>
</div></body></html>
