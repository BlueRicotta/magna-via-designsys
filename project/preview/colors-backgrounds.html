<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Magna Via · Color Backgrounds</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>/* mv-responsive */
  *,*::before,*::after{box-sizing:border-box;}
  html,body{overflow-x:hidden;}
  img,svg{max-width:100%;height:auto;}

  html,body{margin:0;background:#0a0a14;color:#e8e0d0;font-family:'Nunito',sans-serif;}
  .wrap{padding:20px;display:grid;grid-template-columns:repeat(auto-fit, minmax(170px, 1fr));gap:12px;}
  .swatch{border:0.5px solid #2a2a40;border-radius:10px;overflow:hidden;}
  .chip{height:70px;position:relative;}
  .chip .hex{position:absolute;right:8px;bottom:6px;font-family:'Nunito';font-size:10px;color:#887870;letter-spacing:0.08em;}
  .meta{padding:8px 10px 10px;}
  .name{font-family:'Cinzel';font-size:12px;font-weight:600;color:#c8b890;letter-spacing:0.08em;text-transform:uppercase;}
  .sub{font-family:'Nunito';font-size:11px;color:#887870;margin-top:2px;}
</style></head>
<body><div class="wrap">
  <div class="swatch"><div class="chip" style="background:#0a0a14"><span class="hex" style="color:#887870">#0A0A14</span></div><div class="meta"><div class="name">Kingdom Night</div><div class="sub">App base</div></div></div>
  <div class="swatch"><div class="chip" style="background:#14141e"><span class="hex">#14141E</span></div><div class="meta"><div class="name">Arcadia Dark</div><div class="sub">Screen surface</div></div></div>
  <div class="swatch"><div class="chip" style="background:#1e1e30"><span class="hex">#1E1E30</span></div><div class="meta"><div class="name">Stone Wall</div><div class="sub">Cards &amp; containers</div></div></div>
  <div class="swatch"><div class="chip" style="background:#2a2a40"><span class="hex">#2A2A40</span></div><div class="meta"><div class="name">Cobblestone</div><div class="sub">Borders &amp; dividers</div></div></div>
</div></body></html>
