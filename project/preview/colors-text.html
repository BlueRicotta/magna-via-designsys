<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Magna Via · Text Colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>/* mv-responsive */
  *,*::before,*::after{box-sizing:border-box;}
  html,body{overflow-x:hidden;}
  img,svg{max-width:100%;height:auto;}

  html,body{margin:0;background:#0a0a14;font-family:'Nunito',sans-serif;}
  .wrap{padding:20px;display:grid;grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));gap:12px;}
  .swatch{background:#14141e;border:0.5px solid #2a2a40;border-radius:10px;padding:16px;}
  .aa{font-family:'Cinzel';font-weight:700;font-size:28px;letter-spacing:0.04em;}
  .name{font-family:'Cinzel';font-size:12px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;margin-top:10px;}
  .hex{font-family:'Nunito';font-size:11px;color:#887870;margin-top:2px;}
</style></head>
<body><div class="wrap">
  <div class="swatch"><div class="aa" style="color:#e8e0d0">Aa</div><div class="name" style="color:#e8e0d0">Parchment</div><div class="hex">#E8E0D0 · Primary</div></div>
  <div class="swatch"><div class="aa" style="color:#c8b890">Aa</div><div class="name" style="color:#c8b890">Aged Cream</div><div class="hex">#C8B890 · Secondary</div></div>
  <div class="swatch"><div class="aa" style="color:#887870">Aa</div><div class="name" style="color:#887870">Muted Stone</div><div class="hex">#887870 · Hints</div></div>
  <div class="swatch"><div class="aa" style="color:#3a3450">Aa</div><div class="name" style="color:#3a3450">Disabled</div><div class="hex" style="color:#3a3450">#3A3450 · Disabled</div></div>
</div></body></html>
