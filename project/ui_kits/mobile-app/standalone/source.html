<!-- Splash thumbnail: Magna Via constellation star on Kingdom Night -->
<template id="__bundler_thumbnail" data-bg-color="#0a0a14">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="glow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#c8a030" stop-opacity="0.35"/>
        <stop offset="60%" stop-color="#c8a030" stop-opacity="0.08"/>
        <stop offset="100%" stop-color="#0a0a14" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <!-- soft gold aura -->
    <circle cx="600" cy="400" r="380" fill="url(#glow)"/>
    <!-- 8-pointed star -->
    <g transform="translate(600 400)" fill="#c8a030">
      <path d="M 0 -180 L 24 -24 L 180 0 L 24 24 L 0 180 L -24 24 L -180 0 L -24 -24 Z"
            stroke="#e8d090" stroke-width="2"/>
      <path d="M 0 -110 L 110 0 L 0 110 L -110 0 Z" fill="#e8d090" opacity="0.55"/>
    </g>
    <!-- constellation dots -->
    <g fill="#e8d090">
      <circle cx="220" cy="180" r="4"/>
      <circle cx="340" cy="120" r="3"/>
      <circle cx="460" cy="220" r="3.5"/>
      <circle cx="880" cy="180" r="3"/>
      <circle cx="960" cy="260" r="4"/>
      <circle cx="1040" cy="140" r="3"/>
      <circle cx="200" cy="620" r="3.5"/>
      <circle cx="320" cy="680" r="3"/>
      <circle cx="820" cy="640" r="4"/>
      <circle cx="940" cy="700" r="3"/>
    </g>
  </svg>
</template>
